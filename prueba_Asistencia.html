<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync | Control Académico UNAB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
      }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      body { margin: 0; padding: 0; background-color: #f8fafc; overflow-x: hidden; }
      .dark body { background-color: #0f172a; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
      .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .dark ::-webkit-scrollbar-thumb { background: #475569; }
      .grow-up { animation: growUp 1s ease-out forwards; transform-origin: bottom; }
      @keyframes growUp { from { transform: scaleY(0); } to { transform: scaleY(1); } }
      
      /* Doughnut Chart CSS */
      .doughnut-chart {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        position: relative;
      }
      .doughnut-chart::before {
        content: '';
        position: absolute;
        top: 20%; left: 20%; right: 20%; bottom: 20%;
        background-color: white;
        border-radius: 50%;
      }
      .dark .doughnut-chart::before { background-color: #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, addDoc, getDoc, query, where, arrayUnion } from 'firebase/firestore';
        import { 
          LayoutDashboard, Users, BookOpen, Settings, QrCode, 
          AlertTriangle, CheckCircle, XCircle, Moon, Sun,
          UploadCloud, BarChart3, Clock, ShieldAlert, FileSpreadsheet, Calendar,
          GraduationCap, ClipboardList, PieChart, MapPin, LogOut, Save,
          CalendarDays, Gift, PartyPopper, UserCog, Trash2, Bell, Sliders, Hand, UserCircle, Target, TrendingUp, Activity, UserMinus, Timer, MessageSquare, Download, MailWarning, Filter, Library, Search, Layers, ListChecks, BarChart2, Zap
        } from 'lucide-react';

        // ============================================================================
        // 1. FIREBASE CONFIGURATION
        // ============================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyDNmzAMdVD2y-5WSMyanxdo_7zqQoiMINs",
          authDomain: "plataformacontrolacademico-10.firebaseapp.com",
          projectId: "plataformacontrolacademico-10",
          storageBucket: "plataformacontrolacademico-10.firebasestorage.app",
          messagingSenderId: "581717309665",
          appId: "1:581717309665:web:ceaa2a15ed85e52d8c9fa0",
          measurementId: "G-F7M7BJ7QQ7"
        };

        const app = initializeApp(typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'edusync-unab'; 
        
        const PATHS = {
          profiles: collection(db, 'artifacts', appId, 'public', 'data', 'profiles'),
          courses: collection(db, 'artifacts', appId, 'public', 'data', 'courses'),
          sessions: collection(db, 'artifacts', appId, 'public', 'data', 'sessions'),
          attendance: collection(db, 'artifacts', appId, 'public', 'data', 'attendance'),
          grades: collection(db, 'artifacts', appId, 'public', 'data', 'grades'),
          tutorings: collection(db, 'artifacts', appId, 'public', 'data', 'tutorings'),
          events: collection(db, 'artifacts', appId, 'public', 'data', 'events'), 
          nucleos: collection(db, 'artifacts', appId, 'public', 'data', 'nucleos'),
        };

        // ============================================================================
        // 2. ATOMIC UI COMPONENTS
        // ============================================================================
        const Card = ({ children, className = '', onClick }) => (
          <div onClick={onClick} className={`bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 transition-all duration-300 ${onClick ? 'cursor-pointer hover:shadow-lg hover:-translate-y-1' : ''} ${className}`}>
            {children}
          </div>
        );

        const Badge = ({ children, color = 'blue', className = '' }) => {
          const colors = {
            blue: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
            green: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
            red: 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300',
            yellow: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
            purple: 'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300',
            gray: 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300',
            indigo: 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300',
          };
          return (
            <span className={`px-3 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${colors[color] || colors.blue} ${className}`}>
              {children}
            </span>
          );
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, icon: Icon }) => {
          const baseStyle = "flex items-center justify-center gap-2 px-6 py-3.5 rounded-2xl font-bold transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95";
          const variants = {
            primary: "bg-brand-600 hover:bg-brand-700 text-white shadow-lg shadow-brand-500/30 dark:shadow-none",
            secondary: "bg-slate-100 hover:bg-slate-200 text-slate-800 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-white",
            danger: "bg-rose-600 hover:bg-rose-700 text-white shadow-lg shadow-rose-500/30 dark:shadow-none",
            outline: "border-2 border-brand-600 text-brand-600 hover:bg-brand-50 dark:border-brand-400 dark:text-brand-400 dark:hover:bg-brand-900/20",
            success: "bg-emerald-600 hover:bg-emerald-700 text-white shadow-lg shadow-emerald-500/30 dark:shadow-none",
          };
          return (
            <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
              {Icon && <Icon size={18} />}
              {children}
            </button>
          );
        };

        // ============================================================================
        // 3. MAIN APPLICATION ROOT
        // ============================================================================
        function App() {
          const [user, setUser] = useState(null);
          const [profiles, setProfiles] = useState([]);
          const [courses, setCourses] = useState([]);
          const [sessions, setSessions] = useState([]);
          const [attendances, setAttendances] = useState([]);
          const [grades, setGrades] = useState([]);
          const [tutorings, setTutorings] = useState([]);
          const [events, setEvents] = useState([]);
          const [nucleos, setNucleos] = useState([]); 
          const [semesterConfig, setSemesterConfig] = useState({}); 
          
          const [loading, setLoading] = useState(true);
          const [darkMode, setDarkMode] = useState(false);
          const [toast, setToast] = useState(null);

          const [currentView, setCurrentView] = useState('dashboard');
          const [selectedCourse, setSelectedCourse] = useState(null);
          const [roleOverride, setRoleOverride] = useState(null);

          // INIT & AUTH LISTENER
          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              if (currentUser && currentUser.email) {
                const isUNAB = currentUser.email.endsWith('@unab.edu.co');
                const isAdmin = currentUser.email === 'dudbilopr@gmail.com';
                
                if (!isUNAB && !isAdmin) {
                  await signOut(auth);
                  showToast("Acceso denegado. Utiliza un correo institucional @unab.edu.co", "error");
                  setUser(null);
                } else {
                  setUser(currentUser);
                }
              } else {
                setUser(null);
              }
              setLoading(false);
            });
            return () => unsubscribe();
          }, []);

          // FIRESTORE SYNC
          useEffect(() => {
            if (!user) return;
            setLoading(true);
            const errHandler = (e) => console.error("Firestore sync error:", e);

            const unsubs = [
              onSnapshot(PATHS.profiles, s => setProfiles(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.courses, s => setCourses(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.sessions, s => setSessions(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.attendance, s => setAttendances(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.grades, s => setGrades(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.tutorings, s => setTutorings(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.events, s => setEvents(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(PATHS.nucleos, s => setNucleos(s.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler),
              onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'semester'), s => {
                 if (s.exists()) setSemesterConfig(s.data());
              }, errHandler),
            ];
            setTimeout(() => setLoading(false), 800);
            return () => unsubs.forEach(u => u());
          }, [user]);

          useEffect(() => {
            if (darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [darkMode]);

          const showToast = (msg, type = 'info') => {
            setToast({ msg, type });
            setTimeout(() => setToast(null), 4000);
          };

          const realProfile = profiles.find(p => p.id === user?.uid);
          const currentUserProfile = realProfile ? { ...realProfile, role: roleOverride || realProfile.role } : null;

          const handleGoogleLogin = async () => {
            try {
              const provider = new GoogleAuthProvider();
              provider.setCustomParameters({ prompt: 'select_account' });
              const result = await signInWithPopup(auth, provider);
              const loggedUser = result.user;
              const email = loggedUser.email.toLowerCase();
              
              if (!email.endsWith('@unab.edu.co') && email !== 'dudbilopr@gmail.com') {
                await signOut(auth);
                showToast("Solo se permiten correos @unab.edu.co", "error");
                return;
              }
              
              const profileRef = doc(PATHS.profiles, loggedUser.uid);
              const profileSnap = await getDoc(profileRef);
              
              const nowISO = new Date().toISOString();

              if (!profileSnap.exists()) {
                let role = 'student'; 
                if (email === 'dudbilopr@gmail.com') role = 'admin';
                else if (email.includes('director') || email.includes('coordinador')) role = 'director';
                else if (email.includes('docente') || email.includes('profesor') || courses.some(c => c.teacherEmail === email)) role = 'teacher';

                await setDoc(profileRef, {
                  name: loggedUser.displayName || 'Usuario',
                  email: email,
                  role: role,
                  photoURL: loggedUser.photoURL,
                  createdAt: nowISO,
                  campus: '', // Erradicados datos simulados
                  status: 'Activo',
                  birthDate: '', 
                  accessLogs: [nowISO] 
                });
              } else {
                 const existingLogs = profileSnap.data().accessLogs || [];
                 const updatedLogs = [nowISO, ...existingLogs].slice(0, 5);
                 await updateDoc(profileRef, { accessLogs: updatedLogs });
              }
              showToast(`Autenticado como ${loggedUser.displayName}`, 'success');
            } catch (error) {
               console.error(error);
               showToast("Error de autenticación.", "error");
            }
          };

          const handleLogout = async () => {
            await signOut(auth);
            setCurrentView('dashboard');
            setRoleOverride(null);
          };

          // ============================================================================
          // 4. LAYOUT ROUTER
          // ============================================================================
          if (loading) return (
            <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 fade-in">
              <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-brand-600 mb-4"></div>
              <p className="font-bold text-slate-500 uppercase tracking-widest text-sm">Conectando a Firebase...</p>
            </div>
          );

          if (!user || !currentUserProfile) {
            return (
              <div className="flex-1 flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-900 p-4 fade-in font-sans relative overflow-hidden">
                <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-brand-500/20 rounded-full blur-3xl"></div>
                
                <div className="max-w-md w-full bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700 z-10 slide-up">
                  <div className="p-10 text-center">
                    <div className="bg-gradient-to-br from-brand-600 to-brand-800 w-24 h-24 rounded-3xl mx-auto flex items-center justify-center shadow-lg mb-8 rotate-3">
                      <GraduationCap size={48} className="text-white -rotate-3" />
                    </div>
                    <h1 className="text-4xl font-black text-slate-900 dark:text-white tracking-tight mb-2">EduSync</h1>
                    <p className="text-slate-500 dark:text-slate-400 font-medium mb-10">Control Académico UNAB</p>
                    
                    <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 hover:border-brand-500 text-slate-800 dark:text-white px-6 py-4 rounded-2xl font-bold transition-all active:scale-95 group shadow-sm">
                      <svg className="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                      </svg>
                      Ingreso Institucional (@unab)
                    </button>
                    
                    <div className="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700 text-left text-xs text-slate-400 font-medium leading-relaxed">
                      El rol (Estudiante, Docente, Director) es asignado automáticamente validando el registro de la universidad.
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className={`flex-1 flex flex-col lg:flex-row bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300 selection:bg-brand-200`}>
              
              {toast && (
                <div className={`fixed top-6 right-6 z-50 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 slide-up border font-bold
                  ${toast.type === 'error' ? 'bg-white border-rose-500 text-rose-700' : 
                    toast.type === 'success' ? 'bg-white border-emerald-500 text-emerald-700' : 'bg-white border-brand-500 text-brand-700'} dark:bg-slate-800`}>
                  {toast.type === 'error' ? <XCircle size={24} className="text-rose-500"/> : <CheckCircle size={24} className={toast.type === 'success' ? "text-emerald-500" : "text-brand-500"}/>}
                  {toast.msg}
                </div>
              )}

              {/* SIDEBAR */}
              <aside className="w-full lg:w-80 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-800 flex flex-col flex-shrink-0 z-20">
                <div className="p-8 flex items-center gap-4 border-b border-slate-100 dark:border-slate-700">
                  <div className="bg-brand-600 p-3 rounded-2xl shadow-lg">
                    <GraduationCap size={28} className="text-white" />
                  </div>
                  <div>
                    <h1 className="font-black text-2xl tracking-tight text-slate-900 dark:text-white">EduSync</h1>
                    <Badge color="purple" className="mt-1 text-[10px]">{currentUserProfile.role}</Badge>
                  </div>
                </div>

                <nav className="flex-1 px-6 py-6 space-y-2 overflow-y-auto">
                  <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Módulos</p>
                  
                  <NavItem icon={LayoutDashboard} label="Dashboard General" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setSelectedCourse(null);}} />
                  
                  <NavItem icon={BookOpen} label="Asignaturas y Horarios" active={currentView === 'courses' || currentView === 'course-detail'} onClick={() => setCurrentView('courses')} />
                  
                  <NavItem icon={UserCircle} label="Mi Perfil Institucional" active={currentView === 'profile'} onClick={() => setCurrentView('profile')} />

                  {(currentUserProfile.role === 'director' || currentUserProfile.role === 'admin') && (
                    <NavItem icon={Activity} label="Data Science & Analítica" active={currentView === 'analytics'} onClick={() => setCurrentView('analytics')} />
                  )}

                  {currentUserProfile.role === 'admin' && (
                    <NavItem icon={Settings} label="Administración Global" active={currentView === 'admin'} onClick={() => setCurrentView('admin')} />
                  )}
                </nav>

                <div className="p-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800">
                  
                  {realProfile?.role === 'admin' && (
                    <div className="mb-6 bg-purple-100 dark:bg-purple-900/30 p-3 rounded-xl border border-purple-200 dark:border-purple-700/50">
                      <label className="text-[10px] font-black text-purple-600 dark:text-purple-400 uppercase tracking-widest block mb-1">Simulador de Roles</label>
                      <select 
                        value={roleOverride || 'admin'} 
                        onChange={(e) => { setRoleOverride(e.target.value === 'admin' ? null : e.target.value); setCurrentView('dashboard'); }}
                        className="w-full bg-white dark:bg-slate-800 text-xs font-bold text-slate-700 dark:text-slate-300 p-2 rounded-lg border-none outline-none shadow-sm cursor-pointer"
                      >
                        <option value="admin">Administrador (Normal)</option>
                        <option value="student">Test: Modo Estudiante</option>
                        <option value="teacher">Test: Modo Docente</option>
                        <option value="director">Test: Modo Director</option>
                      </select>
                    </div>
                  )}

                  <div className="flex items-center justify-between mb-6 px-2">
                    <span className="text-sm font-bold text-slate-500 flex items-center gap-2"><Moon size={16}/> Dark Mode</span>
                    <button onClick={() => setDarkMode(!darkMode)} className={`w-14 h-7 rounded-full p-1 transition-colors ${darkMode ? 'bg-brand-600' : 'bg-slate-300'}`}>
                      <div className={`w-5 h-5 rounded-full bg-white transition-transform shadow-sm ${darkMode ? 'translate-x-7' : 'translate-x-0'}`}></div>
                    </button>
                  </div>
                  
                  <div className="flex items-center gap-3 p-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
                    <img src={currentUserProfile.photoURL || `https://ui-avatars.com/api/?name=${currentUserProfile.name}&background=2563eb&color=fff`} className="w-10 h-10 rounded-full" alt="Avatar"/>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-black text-slate-900 dark:text-white truncate">{currentUserProfile.name.split(' ')[0]}</p>
                      <p className="text-xs text-slate-500 truncate">{currentUserProfile.email}</p>
                    </div>
                    <button onClick={handleLogout} className="p-2 text-slate-400 hover:text-rose-600 transition-colors">
                      <LogOut size={18} />
                    </button>
                  </div>
                </div>
              </aside>

              {/* MAIN */}
              <main className="flex-1 p-6 md:p-10 overflow-y-auto w-full">
                {currentView === 'dashboard' && <DashboardRouter profile={currentUserProfile} courses={courses} sessions={sessions} attendances={attendances} tutorings={tutorings} events={events} profiles={profiles} semesterConfig={semesterConfig} grades={grades} />}
                {currentView === 'profile' && <ProfileView profile={currentUserProfile} db={db} appId={appId} showToast={showToast} />}
                {currentView === 'courses' && !selectedCourse && <CoursesListView profile={currentUserProfile} courses={courses} profiles={profiles} nucleos={nucleos} onSelectCourse={(c) => { setSelectedCourse(c); setCurrentView('course-detail'); }} />}
                {currentView === 'course-detail' && selectedCourse && <CourseDetailView profile={currentUserProfile} course={selectedCourse} sessions={sessions} attendances={attendances} grades={grades} tutorings={tutorings} profiles={profiles} showToast={showToast} onBack={() => setCurrentView('courses')} db={db} appId={appId} semesterConfig={semesterConfig} nucleos={nucleos}/>}
                {currentView === 'admin' && <AdminView showToast={showToast} profiles={profiles} courses={courses} db={db} events={events} semesterConfig={semesterConfig} appId={appId} grades={grades} attendances={attendances} nucleos={nucleos} />}
                {currentView === 'analytics' && <DirectorView courses={courses} sessions={sessions} attendances={attendances} events={events} profiles={profiles} semesterConfig={semesterConfig} grades={grades} tutorings={tutorings} nucleos={nucleos} showToast={showToast} />}
              </main>

            </div>
          );
        }

        // ============================================================================
        // WIDGET: CALENDARIO INSTITUCIONAL
        // ============================================================================
        const AcademicCalendarWidget = ({ events = [], profiles = [], semesterConfig = {} }) => {
          const now = new Date();
          
          const startDateStr = semesterConfig?.startDate || '2026-02-02';
          const semesterStart = new Date(startDateStr + 'T12:00:00');
          
          const simulatedNow = now < semesterStart ? new Date('2026-03-01T12:00:00') : now;

          const diffTime = simulatedNow.getTime() - semesterStart.getTime();
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
          let rawWeek = Math.ceil(diffDays / 7) || 1;
          if (rawWeek < 1) rawWeek = 1;
          
          const excludedStr = semesterConfig?.excludedWeeks || '9';
          const excludedList = excludedStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
          
          let currentWeek = rawWeek;
          excludedList.forEach(w => {
             if (rawWeek > w) currentWeek--;
          });
          
          const isExcludedWeek = excludedList.includes(rawWeek);
          const isPartialWeek = currentWeek > 0 && currentWeek % 4 === 0 && !isExcludedWeek;

          const upcomingEvents = (events || []).filter(e => {
            const eDate = new Date(e.date + 'T12:00:00');
            const timeDiff = eDate - simulatedNow;
            return timeDiff >= 0 && timeDiff <= (30 * 24 * 60 * 60 * 1000);
          }).sort((a,b) => new Date(a.date + 'T12:00:00') - new Date(b.date + 'T12:00:00')).slice(0, 3);

          const currentMonth = simulatedNow.getMonth() + 1;
          const upcomingBirthdays = (profiles || []).filter(p => {
             if (!p.birthDate) return false;
             const [y, m, d] = p.birthDate.split('-');
             return parseInt(m) === currentMonth && parseInt(d) >= simulatedNow.getDate();
          }).sort((a,b) => parseInt(a.birthDate.split('-')[2]) - parseInt(b.birthDate.split('-')[2])).slice(0, 3);

          return (
            <Card className="flex flex-col h-full bg-gradient-to-b from-white to-slate-50 dark:from-slate-800 dark:to-slate-800/80 border-t-4 border-t-brand-500 relative overflow-hidden">
              <div className="absolute top-[-20px] right-[-20px] opacity-5"><CalendarDays size={150}/></div>
              <h3 className="font-black text-2xl mb-6 flex items-center gap-3 relative z-10"><CalendarDays className="text-brand-500"/> Calendario Académico</h3>
              
              <div className="bg-brand-50 dark:bg-brand-900/30 p-5 rounded-2xl mb-6 relative z-10">
                <p className="text-brand-600 dark:text-brand-400 font-bold text-sm uppercase tracking-widest mb-1">Transcurriendo</p>
                <div className="flex items-center justify-between">
                  <h4 className="text-4xl font-black text-slate-900 dark:text-white">Semana {currentWeek}</h4>
                  {isExcludedWeek ? <Badge color="yellow">Semana Inactiva</Badge> : <Badge color="blue">Periodo Lectivo</Badge>}
                </div>
              </div>

              {isPartialWeek && (
                <div className="bg-rose-500 text-white p-4 rounded-2xl mb-6 flex items-center gap-4 animate-pulse shadow-lg shadow-rose-500/30 relative z-10">
                  <Bell size={28} />
                  <div>
                    <h4 className="font-black text-lg">¡Alerta de Parciales!</h4>
                    <p className="text-sm font-medium text-rose-100">Evaluaciones de corte esta semana.</p>
                  </div>
                </div>
              )}

              <div className="mb-6 relative z-10">
                <h4 className="font-bold text-slate-500 uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><PartyPopper size={14}/> Celebraciones Institucionales</h4>
                {upcomingEvents.length === 0 ? (
                  <p className="text-sm text-slate-400 italic">No hay eventos en los próximos 30 días.</p>
                ) : (
                  <ul className="space-y-3">
                    {upcomingEvents.map(e => (
                      <li key={e.id} className="flex justify-between items-center bg-white dark:bg-slate-700 p-3 rounded-xl border border-slate-100 dark:border-slate-600 shadow-sm">
                        <span className="font-bold text-slate-800 dark:text-white text-sm">{e.title}</span>
                        <Badge color={e.type === 'festivo' ? 'red' : 'purple'}>{new Date(e.date + 'T12:00:00').toLocaleDateString('es-ES', {month: 'short', day: 'numeric'})}</Badge>
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              <div className="relative z-10 mt-auto pt-6 border-t border-slate-200 dark:border-slate-700">
                <h4 className="font-bold text-slate-500 uppercase tracking-widest text-xs mb-3 flex items-center gap-2"><Gift size={14}/> Cumpleaños este Mes</h4>
                {upcomingBirthdays.length === 0 ? (
                  <p className="text-sm text-slate-400 italic">No hay cumpleaños cercanos.</p>
                ) : (
                  <div className="flex flex-col gap-2">
                    {upcomingBirthdays.map(p => (
                      <div key={p.id} className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-brand-100 dark:bg-brand-900/50 flex items-center justify-center text-brand-600 font-black text-xs">
                           {p.name.charAt(0)}
                        </div>
                        <div className="flex-1">
                          <p className="text-sm font-bold text-slate-800 dark:text-white">{p.name.split(' ')[0]}</p>
                          <p className="text-xs text-slate-500">{new Date(p.birthDate + 'T12:00:00').toLocaleDateString('es-ES', {month: 'long', day: 'numeric'})}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </Card>
          );
        };

        // ============================================================================
        // WIDGET: AGENDA SEMANAL INTERACTIVA

        const WeeklyAgendaWidget = ({ courses }) => {
          const days = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab'];
          
          return (
            <Card className="mt-6 overflow-hidden">
               <h3 className="font-black text-2xl mb-6 flex items-center gap-2"><Calendar className="text-brand-500"/> Mi Horario Semanal</h3>
               <div className="overflow-x-auto">
                 <div className="min-w-[800px] grid grid-cols-6 gap-4">

            </Card>

        };

        // ============================================================================
        // MOTOR GRÁFICO NATIVO (NO DEPENDENCIAS EXTRA)
        // ============================================================================
        const NativeBarChart = ({ data, metricName }) => {
            if(!data || data.length === 0) return <div className="text-center p-10 text-slate-500 italic">No hay datos para graficar.</div>;
            const max = Math.max(...data.map(d=>d.value), 1);
            return (
                <div className="w-full h-64 flex items-end justify-around gap-2 mt-4 px-4 relative">
                   {data.map((d,i) => (
                       <div key={i} className="relative flex flex-col justify-end w-full h-full group">
                           <div className="bg-brand-500 hover:bg-brand-400 rounded-t-md transition-all grow-up relative" style={{height: `${(d.value / max) * 100}%`}}>
                               <div className="opacity-0 group-hover:opacity-100 absolute -top-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-xs font-black px-3 py-2 rounded shadow-xl whitespace-nowrap z-50 pointer-events-none">
                                  {d.name}: {d.value}
                               </div>
                           </div>
                           <span className="text-[10px] font-bold text-slate-500 mt-2 truncate text-center max-w-full overflow-hidden" title={d.name}>{d.name}</span>
                       </div>
                   ))}
                </div>
            )
        };

        const NativeScatterChart = ({ data, metricX, metricY }) => {
            if(!data || data.length === 0) return <div className="text-center p-10 text-slate-500">Insuficientes datos.</div>;
            const maxX = Math.max(...data.map(d=>d.x), 100);
            const maxY = Math.max(...data.map(d=>d.y), 5);
            return (
                <div className="w-full h-80 relative bg-slate-900 dark:bg-slate-950 rounded-2xl p-8 shadow-inner mt-4">
                     <div className="absolute left-6 bottom-8 top-8 border-l-2 border-slate-700"></div>
                     <div className="absolute left-6 bottom-8 right-6 border-b-2 border-slate-700"></div>
                     <span className="absolute bottom-2 left-1/2 -translate-x-1/2 text-slate-500 text-xs font-bold uppercase tracking-widest">{metricX} &rarr;</span>
                     <span className="absolute left-1 top-1/2 -translate-y-1/2 -rotate-90 text-slate-500 text-xs font-bold uppercase tracking-widest">&larr; {metricY}</span>

                     {data.map((d, i) => (
                         <div key={i} className="absolute w-3 h-3 rounded-full bg-brand-500 shadow-brand-500/50 shadow-lg cursor-pointer hover:scale-150 hover:bg-emerald-400 transition-all z-10 group" 
                              style={{ bottom: `calc(2rem + ${(d.y / maxY) * 80}%)`, left: `calc(1.5rem + ${(d.x / maxX) * 90}%)` }}>
                             <div className="opacity-0 group-hover:opacity-100 absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-white text-slate-900 text-xs font-black p-2 rounded shadow-xl pointer-events-none whitespace-nowrap z-20">
                                {d.name}<br/>{metricX}: {d.x} | {metricY}: {d.y}
                             </div>
                         </div>
                     ))}
                </div>
            )
        };

        const NativeRadarChart = ({ data }) => {
            if(!data || data.length < 3) return <div className="text-center p-10 text-slate-500">El radar requiere mínimo 3 dimensiones de agrupación.</div>;
            const max = Math.max(...data.map(d=>d.value), 1);
            const cx = 150, cy = 150, r = 100;
            const len = data.length;

            const points = data.map((d, i) => {
                const angle = (Math.PI * 2 * i) / len - Math.PI / 2;
                const valR = (d.value / max) * r;
                return `${cx + valR * Math.cos(angle)},${cy + valR * Math.sin(angle)}`;
            }).join(' ');

            return (
                <div className="w-full flex justify-center mt-4">
                    <svg viewBox="0 0 300 300" className="w-64 h-64 drop-shadow-xl overflow-visible">
                        {data.map((_, i) => {
                            const angle = (Math.PI * 2 * i) / len - Math.PI / 2;
                            return <line key={i} x1={cx} y1={cy} x2={cx + r * Math.cos(angle)} y2={cy + r * Math.sin(angle)} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4" />
                        })}
                        <polygon points={points} fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" strokeWidth="2" className="grow-up" style={{transformOrigin:'center'}}/>
                        {data.map((d, i) => {
                            const angle = (Math.PI * 2 * i) / len - Math.PI / 2;
                            const tx = cx + (r + 20) * Math.cos(angle);
                            const ty = cy + (r + 20) * Math.sin(angle);
                            return (
                                <text key={`t${i}`} x={tx} y={ty} fontSize="8" fill="#64748b" textAnchor="middle" alignmentBaseline="middle" className="font-bold uppercase tracking-widest group">
                                    {d.name.substring(0,10)}
                                    <title>{d.name}: {d.value}</title>
                                </text>
                            )
                        })}
                    </svg>
                </div>
            )
        };

        // ============================================================================

             tutoringSchedule: profile.tutoringSchedule || '' 
          });

          const handleSave = async () => {
             try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', profile.id), formData);
                showToast("Información del perfil actualizada", "success");
             } catch(e) {
                showToast("Error al actualizar perfil", "error");

          return (
             <div className="max-w-4xl mx-auto slide-up space-y-6">
                <header className="mb-8">
                  <h1 className="text-4xl font-black">Mi Perfil Institucional</h1>
                  <p className="text-slate-500 mt-2 font-medium">Actualiza tu información demográfica para uso en el sistema académico y seguimiento analítico.</p>
                </header>
                <Card>
                   <div className="flex flex-col md:flex-row gap-8">
                      <div className="flex flex-col items-center gap-4 border-b md:border-b-0 md:border-r pb-6 md:pb-0 md:pr-8 border-slate-100 dark:border-slate-700">
                         <img src={profile.photoURL || `https://ui-avatars.com/api/?name=${profile.name}&background=2563eb&color=fff`} className="w-32 h-32 rounded-full shadow-lg"/>
                         <Badge color="blue" className="text-sm px-4">{profile.role}</Badge>
                         <p className="text-sm font-bold text-slate-500">{profile.email}</p>
                      </div>
                      <div className="flex-1 space-y-5">
                         <div>
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Nombre Completo</label>
                            <input type="text" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} disabled={profile.role === 'student'} className="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 disabled:opacity-50 focus:border-brand-500 outline-none font-bold"/>
                         </div>
                         <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            {profile.role === 'student' ? (
                               <>
                                 <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Programa Académico / Carrera</label>
                                    <input type="text" placeholder="Ej: Ingeniería de Sistemas" value={formData.program} onChange={e=>setFormData({...formData, program: e.target.value})} className="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:border-brand-500 outline-none"/>

                                 </div>

                                 <div>

                                    <input type="text" placeholder="Ej: Ingeniería" value={formData.faculty} onChange={e=>setFormData({...formData, faculty: e.target.value})} className="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:border-brand-500 outline-none"/>

                            <div>
                               <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">F. Nacimiento</label>
                               <input type="date" value={formData.birthDate} onChange={e=>setFormData({...formData, birthDate: e.target.value})} className="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:border-brand-500 outline-none"/>
                            </div>
                            <div>
                               <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Teléfono Móvil</label>

                            <select value={formData.campus} onChange={e=>setFormData({...formData, campus: e.target.value})} className="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:border-brand-500 outline-none cursor-pointer">
                               <option value="">No definido</option>
                               <option value="Bucaramanga">Bucaramanga</option>

                         {profile.role === 'teacher' && (

        };

        const NavItem = ({ icon: Icon, label, active, onClick }) => (
          <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl font-bold transition-all ${
            active ? 'bg-brand-50 text-brand-700 dark:bg-brand-900/30 dark:text-brand-400 shadow-sm' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'
          }`}>
            <Icon size={20} className={active ? 'text-brand-600' : ''} /> {label}
          </button>
        );

        const DashboardRouter = ({ profile, courses, sessions, attendances, tutorings, events, profiles, semesterConfig, grades }) => {
          if (profile.role === 'student') return <StudentDashboard profile={profile} courses={courses} sessions={sessions} attendances={attendances} events={events} profiles={profiles} semesterConfig={semesterConfig}/>;
          if (profile.role === 'teacher') return <TeacherDashboard profile={profile} courses={courses} sessions={sessions} tutorings={tutorings} events={events} profiles={profiles} semesterConfig={semesterConfig}/>;
          if (profile.role === 'director' || profile.role === 'admin') return <DirectorView courses={courses} sessions={sessions} attendances={attendances} events={events} profiles={profiles} semesterConfig={semesterConfig} grades={grades} tutorings={tutorings} />;
          return null;
        };

        // --- DASHBOARD ESTUDIANTE ---
        const StudentDashboard = ({ profile, courses, sessions, attendances, events, profiles, semesterConfig }) => {
          const myCourses = courses.filter(c => (c.students || []).includes(profile.id) || (c.studentsEmails || []).includes(profile.email));
          
          const stats = useMemo(() => {
            let expected = 0, attended = 0;
            myCourses.forEach(course => {
              if(course.withdrawnStudents && course.withdrawnStudents.includes(profile.email)) return;

              const courseSessions = sessions.filter(s => s.courseId === course.id && s.completed);
              expected += courseSessions.length;
              const courseAttends = attendances.filter(a => a.courseId === course.id && a.studentId === profile.id);
              attended += courseAttends.length;
            });
            const percent = expected === 0 ? 100 : Math.round((attended / expected) * 100);
            const risk = percent <= 80; 
            return { expected, attended, percent, risk, absents: expected - attended };
          }, [myCourses, sessions, attendances, profile.id]);

          return (
            <div className="space-y-8 slide-up max-w-7xl mx-auto">
              <header className="mb-8">
                <h1 className="text-4xl font-black text-slate-900 dark:text-white">Hola, {profile.name.split(' ')[0]} 👋</h1>
                <p className="text-slate-500 text-lg mt-2">Campus UNAB {profile.campus || 'Bucaramanga'} | {profile.program || 'Estudiante'}</p>
              </header>

              {stats.risk && stats.expected > 0 && (
                <div className="bg-gradient-to-r from-rose-500 to-red-600 p-8 rounded-3xl flex items-center gap-6 text-white shadow-xl">
                  <div className="bg-white/20 p-4 rounded-full"><ShieldAlert size={40} /></div>
                  <div>
                    <h3 className="font-black text-2xl">¡Alerta de Riesgo Académico!</h3>
                    <p className="font-medium mt-1">Tu asistencia general ({stats.percent}%) es crítica. Acumulas {stats.absents} inasistencias en total.</p>

                </div>
              )}

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 flex flex-col gap-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <Card className="flex flex-col items-center justify-center py-10 text-center col-span-1 md:col-span-2">
                      <PieChart size={64} className={stats.risk ? "text-rose-500 mb-4" : "text-emerald-500 mb-4"}/>
                      <h3 className="text-5xl font-black">{stats.percent}%</h3>
                      <p className="font-bold text-slate-500 mt-2 uppercase tracking-widest text-xs">Asistencia Global</p>
                    </Card>
                    <Card className="flex flex-col items-center justify-center py-10 text-center">
                      <BookOpen size={64} className="text-brand-500 mb-4"/>
                      <h3 className="text-5xl font-black">{myCourses.length}</h3>
                      <p className="font-bold text-slate-500 mt-2 uppercase tracking-widest text-xs">Cursos Inscritos</p>
                    </Card>
                    <Card className="flex flex-col items-center justify-center py-10 text-center border-b-4 border-b-rose-500">
                      <AlertTriangle size={64} className="text-rose-500 mb-4"/>
                      <h3 className="text-5xl font-black">{stats.absents}</h3>
                      <p className="font-bold text-slate-500 mt-2 uppercase tracking-widest text-xs">Faltas Acumuladas</p>
                    </Card>
                  </div>
                  <WeeklyAgendaWidget courses={myCourses} />
                </div>
                <div className="lg:col-span-1">
                  <AcademicCalendarWidget events={events} profiles={profiles} semesterConfig={semesterConfig} />
                </div>
              </div>
            </div>
          );
        };

        // --- DASHBOARD DOCENTE ---
        const TeacherDashboard = ({ profile, courses, sessions, tutorings, events, profiles, semesterConfig }) => {
          const myCourses = courses.filter(c => c.teacherId === profile.id || c.teacherEmail === profile.email);
          const mySessions = sessions.filter(s => s.teacherId === profile.id && s.completed);

          return (
            <div className="space-y-8 slide-up max-w-7xl mx-auto">
              <header className="mb-8">
                <h1 className="text-4xl font-black">Portal Docente</h1>
                <p className="text-slate-500 text-lg mt-2">Métricas e histórico de gestión de clases.</p>
              </header>

              <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div className="lg:col-span-3 flex flex-col gap-6">
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <Card className="border-t-4 border-brand-500">
                      <p className="text-slate-500 font-bold uppercase tracking-widest text-xs mb-2">Cursos Asignados</p>
                      <h3 className="text-5xl font-black">{myCourses.length}</h3>
                    </Card>
                    <Card className="border-t-4 border-emerald-500">
                      <p className="text-slate-500 font-bold uppercase tracking-widest text-xs mb-2">Clases Dictadas</p>
                      <h3 className="text-5xl font-black">{mySessions.length}</h3>
                    </Card>
                    <Card className="border-t-4 border-purple-500">
                      <p className="text-slate-500 font-bold uppercase tracking-widest text-xs mb-2">Estudiantes Totales</p>
                      <h3 className="text-5xl font-black">{new Set(myCourses.flatMap(c => [...(c.students || []), ...(c.studentsEmails || [])])).size}</h3>
                    </Card>
                  </div>
                  <WeeklyAgendaWidget courses={myCourses} />
                </div>
                <div className="lg:col-span-1">
                   <AcademicCalendarWidget events={events} profiles={profiles} semesterConfig={semesterConfig} />
                </div>
              </div>
            </div>
          );
        };

        // --- LISTA DE CURSOS ---
        const CoursesListView = ({ profile, courses, profiles, nucleos, onSelectCourse }) => {
          const displayCourses = profile.role === 'teacher' 
             ? courses.filter(c => c.teacherId === profile.id || c.teacherEmail === profile.email) 
             : profile.role === 'student' 
               ? courses.filter(c => (c.students || []).includes(profile.id) || (c.studentsEmails || []).includes(profile.email)) 
               : courses; 

          return (
            <div className="space-y-8 slide-up max-w-7xl mx-auto">
              <header className="mb-8">
                <h1 className="text-4xl font-black">Asignaturas y Horarios</h1>
              </header>
              
              {displayCourses.length === 0 ? (
                <Card className="text-center py-20 border-dashed border-2">
                  <BookOpen className="mx-auto text-slate-300 mb-4" size={64}/>
                  <h3 className="text-2xl font-black">Sin asignaturas</h3>
                  <p className="text-slate-500 mt-2">Esperando datos de Coordinación.</p>
                </Card>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                  {displayCourses.map(course => {
                    const teacher = profiles.find(p => p.id === course.teacherId || p.email === course.teacherEmail);
                    const totalEstudiantes = new Set([...(course.students || []), ...(course.studentsEmails || [])]).size;
                    const retirados = (course.withdrawnStudents || []).length; 
                    
                    const nucleoAsignado = nucleos?.find(n => n.code === course.lineaTematica)?.name || course.lineaTematica;

                    return (
                      <Card key={course.id} onClick={() => onSelectCourse(course)} className="hover:border-brand-400 group flex flex-col justify-between">
                        <div>
                           <div className="flex justify-between items-start mb-4">
                              <Badge color="blue" className="inline-block">{course.nrc || course.code}</Badge>
                              {nucleoAsignado && <Badge color="indigo">{nucleoAsignado}</Badge>}
                           </div>
                           <h3 className="font-black text-xl mb-2 group-hover:text-brand-600 transition-colors">{course.name}</h3>
                           <p className="text-slate-500 font-medium flex items-center gap-2"><Clock size={16}/> {course.schedule}</p>
                           {(course.building || course.campus) && <p className="text-slate-400 text-xs mb-4 mt-2 flex items-center gap-2"><MapPin size={14}/> {course.campus} - {course.building}</p>}
                        </div>
                        
                        <div className="pt-4 border-t border-slate-100 dark:border-slate-700 flex justify-between items-center">
                          {(profile.role === 'student' || profile.role === 'admin' || profile.role === 'director') && teacher ? (
                            <span className="text-xs font-bold text-slate-500 truncate mr-2">Prof. {teacher.name.split(' ')[0]}</span>
                          ) : (
                            <span className="text-xs font-bold text-slate-500 flex flex-col">
                               <span>{totalEstudiantes - retirados} Activos</span>
                               {retirados > 0 && <span className="text-rose-500">{retirados} Retirados</span>}
                            </span>
                          )}
                          <span className="text-brand-600 font-black text-sm group-hover:translate-x-1 transition-transform whitespace-nowrap">Ir a Curso &rarr;</span>
                        </div>
                      </Card>
                    )
                  })}
                </div>
              )}
            </div>
          );
        };

        // --- DETALLE DEL CURSO ---
        const CourseDetailView = ({ profile, course, sessions, attendances, grades, tutorings, profiles, showToast, onBack, db, appId, semesterConfig }) => {
          const [topic, setTopic] = useState('');
          const [activeSession, setActiveSession] = useState(sessions.find(s => s.courseId === course.id && s.status === 'active') || null);
          const [studentTokenInput, setStudentTokenInput] = useState('');
          const [activeTab, setActiveTab] = useState('attendance'); 
          
          const [isAddingPast, setIsAddingPast] = useState(false);
          const [pastTopic, setPastTopic] = useState('');
          const [pastDate, setPastDate] = useState('');
          const [editingSession, setEditingSession] = useState(null);

          const [qrRotationSpeed, setQrRotationSpeed] = useState(5); 
          
          const [tutoringData, setTutoringData] = useState({ date: '', time: '', link: '', topic: '' });

          useEffect(() => {
            let interval;
            if (activeSession && profile.role === 'teacher') {
              interval = setInterval(async () => {
                const newToken = Math.random().toString(36).substring(2, 8).toUpperCase();
                await updateDoc(doc(PATHS.sessions, activeSession.id), { currentToken: newToken });
              }, qrRotationSpeed * 1000); 
            }
            return () => clearInterval(interval);
          }, [activeSession, profile.role, qrRotationSpeed]);

          useEffect(() => {
            setActiveSession(sessions.find(s => s.courseId === course.id && s.status === 'active') || null);
          }, [sessions, course.id]);

          const handleStartClass = async () => {
            if (!topic) return showToast("Falta temática", "error");
            await addDoc(PATHS.sessions, {
              courseId: course.id, teacherId: profile.id, topic, status: 'active', completed: false, date: new Date().toISOString(),
              currentToken: Math.random().toString(36).substring(2, 8).toUpperCase()
            });
            showToast("Clase en curso. Mostrando QR...", "success");
          };

          const handleEndClass = async (dictada) => {
            await updateDoc(doc(PATHS.sessions, activeSession.id), { status: 'completed', completed: dictada, currentToken: null });
            if(dictada) {
              const presentes = attendances.filter(a => a.sessionId === activeSession.id).length;
              const totalEst = new Set([...(course.students || []), ...(course.studentsEmails || [])]).size;
              const retirados = (course.withdrawnStudents || []).length;
              const ausentes = (totalEst - retirados) - presentes;
              if (ausentes > 0) showToast(`Se ha registrado la asistencia. (${ausentes} ausentes).`, "info");
              showToast("Clase finalizada.", "success");
            } else {
              showToast("Registrado como clase NO dictada.", "info");
            }
          };

          const handleRegisterAttendance = async () => {
            if (!activeSession) return showToast("No hay clase activa", "error");
            if (studentTokenInput.trim().toUpperCase() !== activeSession.currentToken) return showToast("Token inválido o expirado", "error");
            if (attendances.some(a => a.sessionId === activeSession.id && a.studentId === profile.id)) return showToast("Asistencia ya registrada", "info");
            
            await addDoc(PATHS.attendance, { sessionId: activeSession.id, courseId: course.id, studentId: profile.id, studentEmail: profile.email, timestamp: new Date().toISOString() });
            showToast("¡Asistencia confirmada!", "success");
            setStudentTokenInput('');
          };

          const handleToggleManualAttendance = async (student) => {
             const existingRecord = attendances.find(a => a.sessionId === activeSession.id && (a.studentId === student.id || a.studentEmail === student.email));
             try {
               if (existingRecord) {
                   await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', existingRecord.id));
                   showToast("Asistencia removida (Ausente)", "info");
               } else {
                   await addDoc(PATHS.attendance, { sessionId: activeSession.id, courseId: course.id, studentId: student.id, studentEmail: student.email, timestamp: new Date().toISOString() });
                   showToast("Asistencia registrada manualmente", "success");
               }
             } catch(e) {
                 showToast("Error modificando asistencia", "error");
             }
          };

          const handleCreatePastSession = async () => {
             if (!pastTopic || !pastDate) return showToast("Temática y Fecha son obligatorios", "error");
             try {
                 await addDoc(PATHS.sessions, {
                     courseId: course.id, teacherId: profile.id, topic: pastTopic, status: 'completed', completed: true, date: new Date(pastDate + 'T12:00:00').toISOString(), currentToken: null
                 });
                 showToast("Sesión histórica creada. Usa el botón 'Editar Asist.' para marcar la asistencia.", "success");
                 setIsAddingPast(false); setPastTopic(''); setPastDate('');
             } catch (e) {
                 showToast("Error al crear sesión pasada", "error");
             }
          };

          const handleTogglePastManualAttendance = async (student, sessionId) => {
             const existingRecord = attendances.find(a => a.sessionId === sessionId && (a.studentId === student.id || a.studentEmail === student.email));
             try {
               if (existingRecord) {
                   await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', existingRecord.id));
               } else {
                   await addDoc(PATHS.attendance, { sessionId: sessionId, courseId: course.id, studentId: student.id, studentEmail: student.email, timestamp: new Date().toISOString() });
               }
             } catch(e) {
                 showToast("Error modificando asistencia histórica", "error");
             }
          };

          const handleNotifyAbsentees = (session) => {
              const presentIds = attendances.filter(a => a.sessionId === session.id).map(a=>a.studentEmail);
              const absentees = enrolledStudentsData.filter(st => !presentIds.includes(st.email) && !(course.withdrawnStudents || []).includes(st.email));
              if(absentees.length === 0) return showToast("No hay ausentes a los que notificar en esta sesión.", "info");
              
              const emails = absentees.map(a=>a.email).join(',');
              const subject = `Inasistencia a clase: ${course.name}`;
              const body = `Hola,\n\nHemos notado tu inasistencia a la clase del ${new Date(session.date).toLocaleDateString()} donde abordamos la temática: "${session.topic}".\n\nPor favor, responde este correo indicando el motivo de tu ausencia y no olvides revisar el material correspondiente.\n\nSaludos cordiales,\nProf. ${profile.name}`;
              
              window.open(`mailto:?bcc=${emails}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
              showToast(`Preparando bandeja de correo para notificar a ${absentees.length} estudiantes.`, "success");
          };

          const handleSaveGrade = async (studentEmail, corte, field, value) => {
             const existingGrade = grades.find(g => g.courseId === course.id && g.studentEmail === studentEmail && g.corte === corte);
             
             let finalVal = value;
             if(field !== 'obs') {
                 finalVal = value; 
             }

             try {
               if(existingGrade) {
                 await updateDoc(doc(PATHS.grades, existingGrade.id), { [field]: finalVal });
               } else {
                 await addDoc(PATHS.grades, { courseId: course.id, studentEmail: studentEmail, corte, [field]: finalVal });
               }
               showToast(field === 'obs' ? "Observación guardada." : "Estado de evaluación actualizado.", "success");
             } catch(e) { showToast("Error al guardar", "error"); }
          };

          const handleToggleWithdrawal = async (studentEmail) => {
             const withdrawn = course.withdrawnStudents || [];
             const isWithdrawn = withdrawn.includes(studentEmail);
             
             try {
                let newWithdrawn;
                if(isWithdrawn) {
                   newWithdrawn = withdrawn.filter(e => e !== studentEmail);
                } else {
                   newWithdrawn = [...withdrawn, studentEmail];
                }
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id), { withdrawnStudents: newWithdrawn });
                showToast(`Estudiante marcado como ${isWithdrawn ? 'Activo' : 'Cancelado'}`, "info");
             } catch (e) {
                showToast("Error al actualizar estado del estudiante", "error");
             }
          };

          const handleCreateTutoring = async () => {
             if(!tutoringData.date || !tutoringData.time || !tutoringData.topic) return showToast("Faltan datos de la tutoría", "error");
             try {
                await addDoc(PATHS.tutorings, {
                   courseId: course.id, teacherId: profile.id, ...tutoringData, status: 'scheduled', registeredStudents: []
                });
                showToast("Tutoría programada", "success");
                setTutoringData({ date: '', time: '', link: '', topic: '' });
             } catch(e) {
                showToast("Error al programar tutoría", "error");
             }
          };

          const handleRegisterForTutoring = async (tutoringId) => {
             try {
                await updateDoc(doc(PATHS.tutorings, tutoringId), { registeredStudents: arrayUnion(profile.email) });
                showToast("Registrado exitosamente a la tutoría", "success");
             } catch(e) { showToast("Error al registrarse", "error"); }
          }

          const courseSessions = sessions.filter(s => s.courseId === course.id && s.completed);
          const courseTutorings = tutorings.filter(t => t.courseId === course.id);
          
          const enrolledStudentsData = Array.from(new Set([...(course.studentsEmails || [])])).map(email => {
              const prof = profiles.find(p => p.email === email);
              return prof || { id: email, email: email, name: email.split('@')[0].toUpperCase(), role: 'student' };
          });
          const totalEstudiantes = enrolledStudentsData.length;

          const teacherProfile = profiles.find(p => p.id === course.teacherId || p.email === course.teacherEmail);

          const startDateStr = semesterConfig?.startDate || '2026-02-02';
          const semesterStart = new Date(startDateStr + 'T12:00:00');
          const now = new Date();
          const simulatedNow = now < semesterStart ? new Date('2026-03-01T12:00:00') : now;

          const diffTime = simulatedNow.getTime() - semesterStart.getTime();
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          let currentWeek = Math.ceil(diffDays / 7) || 1;
          if (currentWeek < 1) currentWeek = 1;
          if (currentWeek > 18) currentWeek = 18; 

          const courseExpectedAttends = courseSessions.length * totalEstudiantes;
          const courseActualAttends = attendances.filter(a => a.courseId === course.id).length;
          const courseAttendanceRate = courseExpectedAttends === 0 ? 100 : Math.round((courseActualAttends / courseExpectedAttends) * 100);

          return (
            <div className="max-w-6xl mx-auto slide-up space-y-6">
              <button onClick={onBack} className="text-slate-500 font-bold uppercase tracking-widest text-xs mb-4 hover:text-brand-600">&larr; Regresar</button>
              
              <header className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
                <Badge color="purple" className="mb-4">{course.nrc || course.code}</Badge>
                {course.lineaTematica && <Badge color="indigo" className="mb-4 ml-2">{course.lineaTematica}</Badge>}
                <h1 className="text-4xl font-black text-slate-900 dark:text-white mb-4">{course.name}</h1>
                <div className="flex flex-wrap gap-4">
                  <Badge color="gray"><Clock size={14} className="inline mr-1"/> {course.schedule}</Badge>
                  <Badge color="blue"><Users size={14} className="inline mr-1"/> {totalEstudiantes} Inscritos</Badge>
                  {(course.withdrawnStudents || []).length > 0 && <Badge color="red"><UserMinus size={14} className="inline mr-1"/> {(course.withdrawnStudents || []).length} Retirados</Badge>}
                </div>
              </header>

              <div className="flex gap-2 overflow-x-auto border-b border-slate-200 dark:border-slate-700">
                <button onClick={()=>setActiveTab('attendance')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${activeTab==='attendance' ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><QrCode className="inline mr-2" size={18}/> Asistencia</button>
                <button onClick={()=>setActiveTab('grades')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${activeTab==='grades' ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><ClipboardList className="inline mr-2" size={18}/> Evaluaciones (Excel + Docente)</button>
                <button onClick={()=>setActiveTab('tutoring')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${activeTab==='tutoring' ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><MessageSquare className="inline mr-2" size={18}/> Tutorías</button>
                {(profile.role === 'teacher' || profile.role === 'admin' || profile.role === 'director') && (
                    <button onClick={()=>setActiveTab('analytics')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${activeTab==='analytics' ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><Activity className="inline mr-2" size={18}/> Analítica del Curso</button>
                )}
              </div>

              {/* TAB ASISTENCIA */}
              {activeTab === 'attendance' && (
                <div className="space-y-6 mt-6">
                  {profile.role === 'teacher' && !editingSession && (
                    <Card className={activeSession ? "border-emerald-500 shadow-emerald-500/20 shadow-xl" : ""}>
                      {!activeSession ? (
                        <div className="flex flex-col gap-6">
                           <div>
                               <h2 className="text-2xl font-black mb-4">Activar Control Híbrido (QR / Manual)</h2>
                               <div className="flex flex-col md:flex-row gap-4 mb-4">
                                  <input type="text" placeholder="Temática de la sesión actual" value={topic} onChange={e=>setTopic(e.target.value)} className="w-full md:w-1/2 px-4 py-3 border-2 rounded-xl bg-slate-50 dark:bg-slate-700 font-bold"/>
                                  <select value={qrRotationSpeed} onChange={e=>setQrRotationSpeed(Number(e.target.value))} className="px-4 py-3 border-2 rounded-xl bg-slate-50 dark:bg-slate-700 font-bold text-slate-500 cursor-pointer">
                                      <option value={5}>QR rota cada 5 seg</option>
                                      <option value={10}>QR rota cada 10 seg</option>
                                      <option value={20}>QR rota cada 20 seg</option>
                                      <option value={30}>QR rota cada 30 seg</option>
                                  </select>
                               </div>
                               <Button onClick={handleStartClass}>Iniciar Clase de Hoy</Button>
                           </div>
                           
                           <div className="pt-6 border-t border-slate-200 dark:border-slate-700">
                               {!isAddingPast ? (
                                   <button onClick={() => setIsAddingPast(true)} className="text-sm font-bold text-brand-600 hover:text-brand-700 transition-colors flex items-center gap-2"><Clock size={16}/> + Registrar clase de semanas pasadas</button>
                               ) : (
                                   <div className="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-600 slide-up">
                                       <h3 className="font-black text-sm mb-4 uppercase tracking-widest text-slate-500">Registrar Sesión Histórica</h3>
                                       <div className="flex flex-col md:flex-row gap-4 mb-4">
                                           <input type="date" value={pastDate} onChange={e=>setPastDate(e.target.value)} className="px-4 py-3 border-2 rounded-xl bg-white dark:bg-slate-700 text-sm font-bold"/>
                                           <input type="text" placeholder="Temática vista en esa clase..." value={pastTopic} onChange={e=>setPastTopic(e.target.value)} className="flex-1 px-4 py-3 border-2 rounded-xl bg-white dark:bg-slate-700 text-sm font-bold"/>
                                       </div>
                                       <div className="flex gap-4">
                                           <Button onClick={handleCreatePastSession} className="py-2 text-sm px-6">Guardar Sesión Histórica</Button>
                                           <button onClick={() => setIsAddingPast(false)} className="text-slate-500 hover:text-slate-800 font-bold text-sm px-4">Cancelar</button>
                                       </div>
                                   </div>
                               )}
                           </div>
                        </div>
                      ) : (
                        <div className="flex flex-col xl:flex-row gap-8 items-start">
                           <div className="flex-1 w-full">
                             <Badge color="green" className="mb-4 animate-pulse">Clase en Progreso</Badge>
                             <h2 className="text-3xl font-black mb-6">{activeSession.topic}</h2>
                             
                             <div className="bg-slate-50 dark:bg-slate-900 p-6 rounded-2xl text-center border-2 border-slate-200 flex flex-col items-center justify-center mb-6 relative overflow-hidden">
                               <div className="absolute top-2 right-2"><Badge color="purple"><Timer size={10} className="inline mr-1"/>{qrRotationSpeed}s</Badge></div>
                               <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${activeSession.currentToken}`} alt="QR" className="mx-auto rounded-xl mb-4 relative z-10"/>
                               <span className="text-4xl font-black font-mono tracking-[0.2em] relative z-10">{activeSession.currentToken}</span>
                             </div>

                             <div className="flex gap-4">
                               <Button onClick={()=>handleEndClass(true)} variant="primary" className="flex-1">Finalizar y Guardar</Button>
                               <Button onClick={()=>handleEndClass(false)} variant="danger" className="flex-1">No se dictó</Button>
                             </div>
                           </div>

                           <div className="flex-1 w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 shadow-inner max-h-[500px] overflow-y-auto">
                              <h3 className="font-black text-xl mb-4 flex items-center gap-2"><Hand size={20}/> Marcación Manual</h3>
                              <p className="text-xs text-slate-500 mb-4">Marca la asistencia manualmente para aquellos estudiantes sin dispositivo.</p>
                              <div className="space-y-2">
                                 {enrolledStudentsData.filter(st => !(course.withdrawnStudents || []).includes(st.email)).map(st => {
                                    const isPresent = attendances.some(a => a.sessionId === activeSession.id && (a.studentId === st.id || a.studentEmail === st.email));
                                    return (
                                       <div key={st.email} className="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-100 dark:border-slate-600">
                                          <div className="min-w-0 flex-1 pr-2">
                                             <p className="text-sm font-bold text-slate-800 dark:text-white truncate">{st.name}</p>
                                             <p className="text-[10px] text-slate-500 truncate">{st.email}</p>
                                          </div>
                                          <button 
                                             onClick={() => handleToggleManualAttendance(st)}
                                             className={`px-4 py-2 rounded-lg font-bold text-xs shrink-0 transition-colors ${isPresent ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-slate-200 text-slate-600 hover:bg-slate-300 dark:bg-slate-600 dark:text-slate-300'}`}
                                          >
                                             {isPresent ? '✅ Presente' : 'Marcar'}
                                          </button>
                                       </div>
                                    )
                                 })}
                              </div>
                           </div>
                        </div>
                      )}
                    </Card>
                  )}

                  {profile.role === 'teacher' && editingSession && (
                      <Card className="border-t-[6px] border-t-amber-500 shadow-xl shadow-amber-500/10">
                          <div className="flex justify-between items-center mb-6 border-b pb-4 border-slate-200 dark:border-slate-700">
                              <div>
                                  <Badge color="yellow" className="mb-2">Editando Registro Histórico</Badge>
                                  <h2 className="text-3xl font-black">{editingSession.topic}</h2>
                                  <p className="text-sm text-slate-500 font-bold">{new Date(editingSession.date).toLocaleDateString()}</p>
                              </div>
