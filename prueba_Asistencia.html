          const [selectedPeriod, setSelectedPeriod] = useState(periods[0] || '');
          const [comparePeriod, setComparePeriod] = useState('');
          const [selectedNucleo, setSelectedNucleo] = useState('');
          const [searchTerm, setSearchTerm] = useState('');

          const filteredCourses = courses.filter(c => 
             (selectedPeriod === '' || c.period === selectedPeriod) &&
             (selectedNucleo === '' || c.lineaTematica === selectedNucleo)
          );
          const compareCourses = comparePeriod ? courses.filter(c => c.period === comparePeriod && (selectedNucleo === '' || c.lineaTematica === selectedNucleo)) : [];

          const calculateMetrics = (crs) => {
              const cIds = crs.map(c=>c.id);
              const sess = sessions.filter(s => cIds.includes(s.courseId) && s.completed);
              const atts = attendances.filter(a => cIds.includes(a.courseId));
              const grds = grades.filter(g => cIds.includes(g.courseId));

              let expected = 0;
              crs.forEach(c => {
                 const cSess = sess.filter(s => s.courseId === c.id).length;
                 const cSts = new Set([...(c.students || []), ...(c.studentsEmails || [])]).size;
                 const retirados = (c.withdrawnStudents || []).length;
                 expected += (cSess * (cSts - retirados));
              });
              
              const rate = expected === 0 ? 100 : Math.round((atts.length / expected) * 100);
              
              let approvedCount = 0;
              let totalGrades = 0;
              grds.filter(g=>g.corte===1).forEach(g => {
                 if(g.status) {
                    totalGrades++;
                    if(g.status === 'aprobado') approvedCount++;
                 }
              });
              const passRate = totalGrades === 0 ? 0 : Math.round((approvedCount / totalGrades) * 100);

              const lostHours = sessions.filter(s => cIds.includes(s.courseId) && s.status === 'completed' && s.completed === false).length;

              return { courses: crs.length, sessions: sess.length, attRate: rate, passRate, lostHours };
          };

          const m1 = calculateMetrics(filteredCourses);
          const m2 = comparePeriod ? calculateMetrics(compareCourses) : null;

          const gradeDistrib = [0,0,0,0,0]; 
          const cIdsF = filteredCourses.map(c=>c.id);
          grades.filter(g=>cIdsF.includes(g.courseId)).forEach(g => {
             if (g.p1 !== undefined) {
                 if (g.p1 < 1.0) gradeDistrib[0]++;
                 else if (g.p1 < 2.0) gradeDistrib[1]++;
                 else if (g.p1 < 3.0) gradeDistrib[2]++;
                 else if (g.p1 < 4.0) gradeDistrib[3]++;
                 else gradeDistrib[4]++;
             }
          });
          const maxDistrib = Math.max(...gradeDistrib, 1);

          const studentStats = useMemo(() => {
              if (analyticsTab !== 'students') return [];
              return profiles.filter(p => p.role === 'student' && (p.name.toLowerCase().includes(searchTerm.toLowerCase()) || p.email.includes(searchTerm.toLowerCase()))).map(st => {
                 const myC = filteredCourses.filter(c => (c.studentsEmails || []).includes(st.email) && !(c.withdrawnStudents || []).includes(st.email));
                 if(myC.length === 0) return null;
                 
                 let exp = 0, att = 0;
                 myC.forEach(c => {
                     exp += sessions.filter(s => s.courseId === c.id && s.completed).length;
                     att += attendances.filter(a => a.courseId === c.id && a.studentEmail === st.email).length;
                 });
                 const attRate = exp === 0 ? 100 : Math.round((att/exp)*100);
                 
                 let sumGrades = 0, countGrades = 0;
                 myC.forEach(c => {
                    const g = grades.find(gr => gr.courseId === c.id && gr.studentEmail === st.email && gr.corte === 1);
                    if(g && g.p1 !== undefined) {
                       sumGrades += g.p1;
                       countGrades++;
                    }
                 });
                 const avgGrade = countGrades === 0 ? '--' : (sumGrades/countGrades).toFixed(1);

                 return { ...st, enrolledCount: myC.length, attRate, avgGrade };
              }).filter(Boolean);
          }, [analyticsTab, profiles, filteredCourses, searchTerm, sessions, attendances, grades]);

          const tutoringStats = useMemo(() => {
              if (analyticsTab !== 'tutorings') return { byTeacher: {}, byCourse: {} };
              const filteredTuts = tutorings.filter(t => cIdsF.includes(t.courseId));
              const byT = {};
              const byC = {};
              filteredTuts.forEach(t => {
                  const teacher = profiles.find(p => p.id === t.teacherId);
                  const tName = teacher ? teacher.name : 'Desconocido';
                  byT[tName] = (byT[tName] || 0) + 1;
                  
                  const course = filteredCourses.find(c => c.id === t.courseId);
                  const cName = course ? course.name : 'Desconocido';
                  byC[cName] = (byC[cName] || 0) + 1;
              });
              return { byTeacher: byT, byCourse: byC, total: filteredTuts.length };
          }, [analyticsTab, tutorings, cIdsF, profiles, filteredCourses]);

          const handleDownloadDB = () => {
             showToast("Generando copias de seguridad Excel...", "info");
             const wb = XLSX.utils.book_new();
             
             const wsCourses = XLSX.utils.json_to_sheet(filteredCourses);
             XLSX.utils.book_append_sheet(wb, wsCourses, "Cursos");

             const wsAtts = XLSX.utils.json_to_sheet(attendances.filter(a => cIdsF.includes(a.courseId)));
             XLSX.utils.book_append_sheet(wb, wsAtts, "Asistencias");

             const wsGrades = XLSX.utils.json_to_sheet(grades.filter(g => cIdsF.includes(g.courseId)));
             XLSX.utils.book_append_sheet(wb, wsGrades, "Notas");

             XLSX.writeFile(wb, `EduSync_Backup_${selectedPeriod || 'Global'}.xlsx`);
             showToast("Descarga completada con éxito", "success");
          };

          // INYECCIÓN: GENERADOR CUSTOM DE GRÁFICOS REALES
          const CustomReportBuilder = () => {
              const [cType, setCType] = useState('bar');
              const [dim, setDim] = useState('faculty'); 
              const [metric, setMetric] = useState('attRate'); 

              const getCustomData = () => {
                  const cMetrics = filteredCourses.map(c => {
                      const cSess = sessions.filter(s => s.courseId === c.id && s.completed).length;
                      const cAtts = attendances.filter(a => a.courseId === c.id).length;
                      const cSts = new Set([...(c.students || []), ...(c.studentsEmails || [])]).size;
                      const withdrawn = (c.withdrawnStudents || []).length;
                      const exp = cSess * (cSts - withdrawn);
                      const attR = exp === 0 ? 0 : (cAtts/exp)*100;
                      
                      const cGrds = grades.filter(g => g.courseId === c.id && g.corte === 1);
                      let sg = 0, cg = 0, passed = 0, teval = 0;
                      cGrds.forEach(g => {
                          if(g.p1 !== undefined) { sg+=g.p1; cg++; }
                          if(g.status) { teval++; if(g.status==='aprobado') passed++; }
                      });
                      const pR = teval === 0 ? 0 : (passed/teval)*100;
                      const lH = sessions.filter(s => s.courseId === c.id && s.status === 'completed' && s.completed === false).length;

                      return { ...c, attRate: attR, passRate: pR, avgGrade: cg===0?0:sg/cg, enrolled: cSts-withdrawn, lostHours: lH };
                  });

                  const grouped = {};
                  cMetrics.forEach(c => {
                      let key = c[dim] || 'Sin Asignar';
                      if(dim === 'lineaTematica' && c[dim]) {
                          key = nucleos.find(n=>n.code === c[dim])?.name || c[dim];
                      }
                      if(!grouped[key]) grouped[key] = { c: 0, sum: 0 };
                      grouped[key].c++;
                      grouped[key].sum += c[metric] || 0;
                  });

                  return Object.keys(grouped).map(k => ({
                      name: k,
                      value: grouped[k].c === 0 ? 0 : Number((grouped[k].sum / grouped[k].c).toFixed(1))
                  })).sort((a,b)=>b.value - a.value).slice(0, 10);
              };

              const chartData = useMemo(() => getCustomData(), [dim, metric, filteredCourses]);

              return (
                  <Card className="slide-up mt-6 border-t-[4px] border-t-brand-500">
                     <h3 className="font-black text-2xl mb-2 flex items-center gap-2"><BarChart2 className="text-brand-500"/> Generador Dinámico de Gráficas</h3>
                     <p className="text-slate-500 mb-6 font-medium">Control total de métricas reales para cruce y minería de datos educativos.</p>
                     
                     <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div>
                           <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Tipo de Gráfico</label>
                           <select value={cType} onChange={e=>setCType(e.target.value)} className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 font-bold outline-none text-sm">
                              <option value="bar">Barras Horizontales</option>
                              <option value="radar">Araña / Radar</option>
                           </select>
                        </div>
                        <div>
                           <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Eje X / Agrupar Por</label>
                           <select value={dim} onChange={e=>setDim(e.target.value)} className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 font-bold outline-none text-sm">
                              <option value="faculty">Facultad</option>
                              <option value="department">Departamento</option>
                              <option value="lineaTematica">Línea / Núcleo Temático</option>
                              <option value="name">Curso Específico</option>
                           </select>
                        </div>
                        <div>
                           <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Eje Y / Métrica a Evaluar</label>
                           <select value={metric} onChange={e=>setMetric(e.target.value)} className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 font-bold outline-none text-sm">
                              <option value="attRate">Tasa de Asistencia (%)</option>
                              <option value="passRate">Tasa de Aprobación (%)</option>
                              <option value="avgGrade">Nota Promedio (0-5)</option>
                              <option value="lostHours">Horas Perdidas Promedio</option>
                              <option value="enrolled">Promedio Inscritos x Grupo</option>
                           </select>
                        </div>
                     </div>

                     <div className="bg-slate-900 dark:bg-slate-950 p-6 rounded-2xl shadow-inner min-h-[350px]">
                        {cType === 'bar' && <NativeBarChart data={chartData} metricName={metric} />}
                        {cType === 'radar' && <NativeRadarChart data={chartData} />}
                     </div>

                     {chartData.length > 0 && (
                         <div className="mt-6 bg-brand-50 dark:bg-brand-900/20 border border-brand-200 dark:border-brand-800 p-4 rounded-xl flex items-start gap-3">
                             <Zap className="text-brand-500 shrink-0 mt-1"/>
                             <div>
                                 <h4 className="font-black text-brand-800 dark:text-brand-300">Insights Detectados por Inteligencia de Datos:</h4>
                                 <p className="text-sm font-bold text-slate-700 dark:text-slate-400 mt-1">
                                     El máximo valor recae sobre <strong className="text-brand-600 dark:text-white">"{chartData[0].name}"</strong> con <strong className="text-brand-600 dark:text-white">{chartData[0].value}</strong>.
                                     Se sugiere prestar atención a <strong className="text-rose-500">"{chartData[chartData.length-1].name}"</strong> que presenta el valor más bajo de su agrupación ({chartData[chartData.length-1].value}).
                                 </p>
                             </div>
                         </div>
                     )}
                  </Card>
              );
          };

          return (
            <div className="space-y-8 slide-up max-w-7xl mx-auto">
              <header className="mb-8 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
                <div>
                   <h1 className="text-4xl font-black text-slate-900 dark:text-white">Analítica Institucional (Data Science)</h1>
                   <p className="text-slate-500 font-medium mt-2">Filtros multidimensionales, generador de gráficas propio y descargas en Excel.</p>
                </div>
                <Button onClick={handleDownloadDB} icon={Download} variant="secondary">Descargar Excel (Backup)</Button>
              </header>

              <Card className="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700">
                 <div className="flex flex-col sm:flex-row items-center gap-4">
                    <div className="flex-1 w-full">
                       <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 flex items-center gap-1"><Filter size={12}/> Periodo Principal</label>
                       <select value={selectedPeriod} onChange={e=>setSelectedPeriod(e.target.value)} className="w-full p-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 font-bold outline-none">
                          <option value="">Consolidado (Todos)</option>
                          {periods.map(p => <option key={p} value={p}>{p}</option>)}
                       </select>
                    </div>
                    <div className="flex-1 w-full">
                       <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 flex items-center gap-1"><Library size={12}/> Núcleo Temático / Línea</label>
                       <select value={selectedNucleo} onChange={e=>setSelectedNucleo(e.target.value)} className="w-full p-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 font-bold outline-none">
                          <option value="">Todas las líneas</option>
                          {nucleos.map(n => <option key={n.code} value={n.code}>{n.name}</option>)}
                       </select>
                    </div>
                    <div className="flex items-center justify-center shrink-0 mt-4 sm:mt-0 font-black text-slate-300 px-4">VS</div>
                    <div className="flex-1 w-full">
                       <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Comparar Con (Periodo)</label>
                       <select value={comparePeriod} onChange={e=>setComparePeriod(e.target.value)} className="w-full p-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 font-bold outline-none">
                          <option value="">Sin comparativa</option>
                          {periods.filter(p=>p!==selectedPeriod).map(p => <option key={p} value={p}>{p}</option>)}
                       </select>
                    </div>
                 </div>
              </Card>

              <div className="flex gap-2 overflow-x-auto border-b border-slate-200 dark:border-slate-700">
                <button onClick={()=>setAnalyticsTab('global')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${analyticsTab==='global' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}>Resumen Global</button>
                <button onClick={()=>setAnalyticsTab('custom')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${analyticsTab==='custom' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}>Generador Gráficas Custom</button>
                <button onClick={()=>setAnalyticsTab('students')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${analyticsTab==='students' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}>Desempeño Estudiantes</button>
                <button onClick={()=>setAnalyticsTab('tutorings')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${analyticsTab==='tutorings' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}>Estadísticas de Tutorías</button>
              </div>

              {analyticsTab === 'global' && (
                  <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 slide-up">
                     <div className="lg:col-span-3 flex flex-col gap-6">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            <Card className="border-t-4 border-blue-500">
                               <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-2">Cursos</p>
                               <h3 className="text-4xl font-black">{m1.courses}</h3>
                               {m2 && <p className="text-xs font-bold mt-2 text-slate-400">VS {m2.courses} en {comparePeriod}</p>}
                            </Card>
                            <Card className="border-t-4 border-emerald-500">
                               <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-2">Aprobación (C1)</p>
                               <h3 className="text-4xl font-black">{m1.passRate}%</h3>
                               <p className="text-[10px] font-bold mt-1 text-emerald-600/70">Aprobados por el docente</p>
                               {m2 && <p className="text-xs font-bold mt-1 text-slate-400">VS {m2.passRate}% en {comparePeriod}</p>}
                            </Card>
                            <Card className="border-t-4 border-rose-500">
                               <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-2">Asistencia Global</p>
                               <h3 className={`text-4xl font-black ${m1.attRate < 80 ? 'text-rose-600' : 'text-emerald-600'}`}>{m1.attRate}%</h3>
                               {m2 && <p className={`text-xs font-bold mt-2 ${m2.attRate < m1.attRate ? 'text-emerald-500' : 'text-rose-500'}`}>VS {m2.attRate}% en {comparePeriod}</p>}
                            </Card>
                            <Card className="border-t-4 border-amber-500 bg-amber-50 dark:bg-amber-900/10">
                               <p className="text-amber-600 dark:text-amber-400 font-bold uppercase tracking-widest text-[10px] mb-2 flex items-center gap-1"><Clock size={12}/> Horas Perdidas</p>
                               <h3 className="text-4xl font-black text-amber-700 dark:text-amber-300">{m1.lostHours} <span className="text-sm">ses.</span></h3>
                               <p className="text-[10px] font-bold mt-2 text-amber-600/70">Clases no dictadas por el docente</p>
                            </Card>
                        </div>
                        
                        <div className="grid grid-cols-1 gap-6">
                           <Card className="bg-slate-900 dark:bg-slate-950 border-none shadow-2xl">
                               <h3 className="text-white font-black text-xl mb-6 flex items-center gap-2"><BarChart3 size={20} className="text-brand-400"/> Distribución de Notas del Sistema (Oficiales)</h3>
                               <div className="flex items-end justify-between h-40 gap-2 mb-2">
                                  {gradeDistrib.map((val, idx) => (
                                      <div key={idx} className="relative flex flex-col justify-end w-full h-full group">
                                         <div className="bg-brand-500 hover:bg-brand-400 rounded-t-md transition-all grow-up" style={{height: `${(val / maxDistrib) * 100}%`}}></div>
                                         <div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-white text-slate-900 text-xs font-black px-2 py-1 rounded shadow-lg">{val}</div>
                                      </div>
                                  ))}
                               </div>
                               <div className="flex justify-between text-slate-400 text-xs font-bold border-t border-slate-700 pt-2">
                                  <span>0-1</span><span>1-2</span><span>2-3</span><span>3-4</span><span>4-5</span>
                               </div>
                           </Card>
                        </div>
                     </div>
                     <div className="lg:col-span-1">
                        <AcademicCalendarWidget events={events} profiles={profiles} semesterConfig={semesterConfig} />
                     </div>
                  </div>
              )}

              {analyticsTab === 'custom' && <CustomReportBuilder />}

              {analyticsTab === 'students' && (
                  <Card className="slide-up">
                      <div className="flex justify-between items-center mb-6">
                         <h3 className="font-black text-2xl">Métricas y Seguimiento por Estudiante</h3>
                         <div className="relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                            <input type="text" placeholder="Buscar alumno..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2 border rounded-xl bg-slate-50 text-sm font-bold"/>
                         </div>
                      </div>
                      <div className="overflow-x-auto">
                         <table className="w-full text-left text-sm min-w-[700px]">
                            <thead><tr className="border-b-2 text-slate-400 uppercase tracking-widest"><th className="pb-3">Estudiante</th><th className="pb-3">Programa</th><th className="pb-3 text-center">Materias</th><th className="pb-3 text-center">Asistencia %</th><th className="pb-3 text-center">Nota Sistema Promedio</th></tr></thead>
                            <tbody>
                               {studentStats.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-slate-400">No hay datos en esta categoría.</td></tr>}
                               {studentStats.map(st => (
                                  <tr key={st.id} className="border-b border-slate-100 hover:bg-slate-50">
                                     <td className="py-4 font-bold flex items-center gap-3">
                                        <img src={st.photoURL || `https://ui-avatars.com/api/?name=${st.name}&background=eee`} className="w-8 h-8 rounded-full"/>
                                        <div><p>{st.name}</p><p className="text-[10px] text-slate-500 font-medium">{st.email}</p></div>
                                     </td>
                                     <td className="py-4 text-xs font-bold text-slate-500">{st.program || 'No definido'}</td>
                                     <td className="py-4 text-center font-black">{st.enrolledCount}</td>
                                     <td className="py-4 text-center"><Badge color={st.attRate < 80 ? 'red' : 'green'}>{st.attRate}%</Badge></td>
                                     <td className="py-4 text-center font-black">{st.avgGrade}</td>
                                  </tr>
                               ))}
                            </tbody>
                         </table>
                      </div>
                  </Card>
              )}

              {analyticsTab === 'tutorings' && (
                  <div className="slide-up grid grid-cols-1 md:grid-cols-2 gap-6">
                      <Card className="md:col-span-2 border-t-4 border-purple-500">
                          <h3 className="font-black text-2xl">Total Tutorías Registradas: {tutoringStats.total}</h3>
                      </Card>
                      <Card>
                          <h3 className="font-black text-xl mb-4 border-b pb-2">Top Docentes (Tutorías)</h3>
                          <ul className="space-y-3">
                              {Object.entries(tutoringStats.byTeacher).sort((a,b)=>b[1]-a[1]).map(([name, count]) => (
                                  <li key={name} className="flex justify-between items-center text-sm font-bold text-slate-700">
                                      <span>{name}</span><Badge color="purple">{count} Sesiones</Badge>
                                  </li>
                              ))}
                          </ul>
                      </Card>
                      <Card>
                          <h3 className="font-black text-xl mb-4 border-b pb-2">Top Materias (Tutorías)</h3>
                          <ul className="space-y-3">
                              {Object.entries(tutoringStats.byCourse).sort((a,b)=>b[1]-a[1]).map(([name, count]) => (
                                  <li key={name} className="flex justify-between items-center text-sm font-bold text-slate-700">
                                      <span>{name}</span><Badge color="blue">{count} Sesiones</Badge>
                                  </li>
                              ))}
                          </ul>
                      </Card>
                  </div>
              )}
            </div>
          );
        };

        // --- DASHBOARD ADMIN ---
        const AdminView = ({ showToast, profiles, courses, db, events, semesterConfig, appId, grades, attendances = [], nucleos = [] }) => {
          const [adminTab, setAdminTab] = useState('resumen'); 
          
          const [eventTitle, setEventTitle] = useState('');
          const [eventDate, setEventDate] = useState('');
          const [eventType, setEventType] = useState('institucional');

          const [semStart, setSemStart] = useState('2026-02-02');
          const [semEnd, setSemEnd] = useState('2026-05-29');
          const [semExcluded, setSemExcluded] = useState('9'); 
          
          const [roleFilter, setRoleFilter] = useState('all');

          const [newNucleoCode, setNewNucleoCode] = useState('');
          const [newNucleoName, setNewNucleoName] = useState('');

          useEffect(() => {
              if (semesterConfig && semesterConfig.startDate) {
                  setSemStart(semesterConfig.startDate);
                  setSemEnd(semesterConfig.endDate || '');
                  setSemExcluded(semesterConfig.excludedWeeks || '');
              }
          }, [semesterConfig]);

          const filteredProfiles = profiles.filter(p => roleFilter === 'all' || p.role === roleFilter);

          const handleProgramacionUpload = async (e) => {
             const file = e.target.files[0];
             if(!file) return;
             showToast("Procesando Archivo de Programación Académica...", "info");
             
             const reader = new FileReader();
             reader.onload = async (evt) => {
                try {
                  const bstr = evt.target.result;
                  const wb = XLSX.read(bstr, {type:'binary'});
                  const wsname = wb.SheetNames[0];
                  const data = XLSX.utils.sheet_to_json(wb.Sheets[wsname]);
                  
                  let aggregatedCourses = {};

                  for (let row of data) {
                     if(row['NRC'] && (row['TITULO_PROGRAMACION'] || row['TITULO_SCACRSE'] || row['MATERIA'])) {
                        const nrcStr = String(row['NRC']);
                        let scheduleDays = [];
                        if (row['LUN']) scheduleDays.push('Lun');
                        if (row['MAR']) scheduleDays.push('Mar');
                        if (row['MIE']) scheduleDays.push('Mie');
                        if (row['JUE']) scheduleDays.push('Jue');
                        if (row['VIE']) scheduleDays.push('Vie');
                        if (row['SAB']) scheduleDays.push('Sab');
                        if (row['DOM']) scheduleDays.push('Dom');
                        const schedule = `${scheduleDays.join(', ')} ${row['HORA INI'] || ''}-${row['HORA FIN'] || ''}`;
                        
                        const rawMateria = row['MATERIA'] || '';
                        const lineaTematica = rawMateria.replace(/[^A-Za-z]/g, '');

                        if (!aggregatedCourses[nrcStr]) {
                            aggregatedCourses[nrcStr] = {
                                period: row['PERIODO'] || '',
                                nrc: nrcStr,
                                name: row['TITULO_PROGRAMACION'] || row['TITULO_SCACRSE'] || row['MATERIA'] || 'Sin Nombre',
                                code: `${row['MATERIA'] || ''}${row['CURSO'] || ''}`,
                                lineaTematica: lineaTematica,
                                faculty: row['COLL_NAME'] || '',
                                department: row['DEPT_NAME'] || '', 
                                teacherEmail: (row['EMAIL'] || '').toLowerCase(),
                                teacherName: `${row['NOMBRE'] || ''} ${row['APELLIDOS'] || ''}`.trim() || row['ID DOCENTE'],
                                schedule: schedule,
                                campus: row['CAMPUS'] || '',
                                building: `${row['EDIFICIO'] || ''} ${row['SALON'] || ''}`.trim(),
                                capacity: row['CAPACIDAD MAXIMA'] || 0,
                                enrolledCount: row['INSCRITOS'] || 0,
                                availableSeats: row['CUPOS DISPONIBLES'] || 0,
                                credits: row['HORAS_CREDITO'] || 3
                            };
                        } else {
                            if (!aggregatedCourses[nrcStr].schedule.includes(schedule)) {
                                aggregatedCourses[nrcStr].schedule += ` | ${schedule}`;
                            }
                        }
                     }
                  }

                  let count = 0;
                  for (let nrc in aggregatedCourses) {
                      const courseData = aggregatedCourses[nrc];
                      const existingCourse = courses.find(c => c.nrc === nrc);
                      
                      if (existingCourse) {
                          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', existingCourse.id), courseData);
                      } else {
                          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'courses'), {
                              ...courseData,
                              studentsEmails: [], 
                              students: []
                          });
                      }
                      count++;
                  }
                  
                  showToast(`Programación Sincronizada: ${count} grupos listos con Núcleos y Departamentos.`, "success");
                } catch(err) {
                  showToast("Error al procesar el archivo de programación.", "error");
                  console.error(err);
                }
             };
             reader.readAsBinaryString(file);
          };

          const handleInscritosUpload = async (e) => {
             const file = e.target.files[0];
             if(!file) return;
             showToast("Procesando Archivo de Inscritos y Notas CDA...", "info");
             
             const reader = new FileReader();
             reader.onload = async (evt) => {
                try {
                  const bstr = evt.target.result;
                  const wb = XLSX.read(bstr, {type:'binary'});
                  const wsname = wb.SheetNames[0];
                  const data = XLSX.utils.sheet_to_json(wb.Sheets[wsname]);
                  
                  let coursesMap = {}; 
                  let gradesToUpdate = [];

                  for (let row of data) {
                      if (row['NRC'] && row['MAIL']) {
                          const nrcStr = String(row['NRC']);
                          const email = row['MAIL'].toLowerCase();
                          if (!coursesMap[nrcStr]) coursesMap[nrcStr] = new Set();
                          coursesMap[nrcStr].add(email);

                          if (row['GNAME'] && row['NOTA_SH']) {
                              const notaVal = parseFloat(row['NOTA_SH']);
                              const corteInfo = row['GNAME'].includes('1') ? 1 : (row['GNAME'].includes('2') ? 2 : 0);
                              
                              if (!isNaN(notaVal) && corteInfo !== 0) {
                                  gradesToUpdate.push({
                                      nrc: nrcStr,
                                      email: email,
                                      corte: corteInfo,
                                      nota: notaVal,
                                      gname: row['GNAME']
                                  });
                              }
                          }
                      }
                  }

                  let updatedCourses = 0;
                  for (let nrc in coursesMap) {
                      const existingCourse = courses.find(c => c.nrc === nrc);
                      if (existingCourse) {
                          const currentEmails = existingCourse.studentsEmails || [];
                          const newExcelEmails = Array.from(coursesMap[nrc]);

                          const mergedEmails = Array.from(new Set([...currentEmails, ...newExcelEmails]));
                          
                          const newlyWithdrawn = currentEmails.filter(e => !newExcelEmails.includes(e));
                          let currentWithdrawn = existingCourse.withdrawnStudents || [];
                          currentWithdrawn = currentWithdrawn.filter(e => !newExcelEmails.includes(e));
                          const finalWithdrawn = Array.from(new Set([...currentWithdrawn, ...newlyWithdrawn]));
                          
                          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'courses', existingCourse.id), {
                              studentsEmails: mergedEmails,
                              withdrawnStudents: finalWithdrawn
                          });
                          updatedCourses++;
                      }
                  }

                  showToast(`Listas de clase vinculadas en ${updatedCourses} asignaturas y motor de deserción actualizado. Sincronizando notas oficiales...`, "info");

                  let notesCount = 0;
                  for (let g of gradesToUpdate) {
                      const course = courses.find(c => c.nrc === g.nrc);
                      if (course) {
                          const field = 'p1'; 
                          const existingGrade = grades?.find(gr => gr.courseId === course.id && gr.studentEmail === g.email && gr.corte === g.corte);
                          if(existingGrade) {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'grades', existingGrade.id), { [field]: g.nota, pName: g.gname });
                          } else {
                            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'grades'), { courseId: course.id, studentEmail: g.email, corte: g.corte, [field]: g.nota, pName: g.gname });
                          }
                          notesCount++;
                      }
                  }

                  showToast(`Éxito total: ${updatedCourses} asignaturas y ${notesCount} calificaciones sincronizadas con la BD.`, "success");
                } catch(err) {
                  showToast("Error al procesar el cruce de inscritos y notas.", "error");
                  console.error(err);
                }
             };
             reader.readAsBinaryString(file);
          };

          const handleAddEvent = async () => {
             if (!eventTitle || !eventDate) return showToast("Faltan datos del evento", "error");
             try {

                <div>

                </div>
              </header>

              <div className="flex gap-2 overflow-x-auto border-b border-slate-200 dark:border-slate-700">
                <button onClick={()=>setAdminTab('resumen')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${adminTab==='resumen' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><LayoutDashboard className="inline mr-2" size={18}/> Ingesta (Excel)</button>
                <button onClick={()=>setAdminTab('usuarios')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${adminTab==='usuarios' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><UserCog className="inline mr-2" size={18}/> Usuarios y Logs</button>
                <button onClick={()=>setAdminTab('calendario')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${adminTab==='calendario' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><PartyPopper className="inline mr-2" size={18}/> Eventos</button>
                <button onClick={()=>setAdminTab('semestre')} className={`px-6 py-4 font-black text-sm rounded-t-2xl border-b-4 ${adminTab==='semestre' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-500 hover:bg-slate-100'}`}><Sliders className="inline mr-2" size={18}/> Configuración Principal</button>
              </div>

              {adminTab === 'resumen' && (
                 <>
                   <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                      <Card className="border-t-[4px] border-t-blue-500 p-4"><p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-1">Total Cursos</p><h3 className="text-3xl font-black">{courses.length}</h3></Card>
                      <Card className="border-t-[4px] border-t-emerald-500 p-4"><p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-1">Total Estudiantes</p><h3 className="text-3xl font-black">{profiles.filter(p=>p.role==='student').length}</h3></Card>
                      <Card className="border-t-[4px] border-t-purple-500 p-4"><p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-1">Total Docentes</p><h3 className="text-3xl font-black">{profiles.filter(p=>p.role==='teacher').length}</h3></Card>
                      <Card className="border-t-[4px] border-t-brand-500 p-4"><p className="text-slate-500 font-bold uppercase tracking-widest text-[10px] mb-1">Asistencias Exitosas</p><h3 className="text-3xl font-black text-brand-600">{attendances.length}</h3></Card>

                     <Card className="border-t-[6px] border-t-emerald-500 text-center py-12">
                        <FileSpreadsheet size={64} className="mx-auto text-emerald-500 mb-6"/>
                        <h3 className="text-2xl font-black mb-2">Inscritos en Cursos CDA</h3>
                        <p className="text-slate-500 mb-6 font-medium text-sm">Carga el archivo <code>INSCRITOS EN CURSOS CDA...</code> aquí para vincular estudiantes a los NRC correspondientes.</p>
                        
                        <label className="cursor-pointer bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-2xl shadow-lg transition-colors inline-block">

                           <input type="file" accept=".xlsx, .xls, .csv" className="hidden" onChange={handleInscritosUpload} />
                        </label>
                     </Card>
                   </div>
                 </>
              )}

              {adminTab === 'usuarios' && (
                 <Card className="mt-6">
                    <h3 className="font-black text-2xl mb-6">Auditoría de Roles y Logs de Accesos</h3>
                    
                    <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                       <button onClick={()=>setRoleFilter('all')} className={`px-4 py-2 rounded-xl font-bold text-sm ${roleFilter==='all' ? 'bg-slate-800 text-white dark:bg-brand-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 dark:bg-slate-700'}`}>Todos ({profiles.length})</button>
                       <button onClick={()=>setRoleFilter('student')} className={`px-4 py-2 rounded-xl font-bold text-sm ${roleFilter==='student' ? 'bg-slate-800 text-white dark:bg-brand-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 dark:bg-slate-700'}`}>Estudiantes</button>
                       <button onClick={()=>setRoleFilter('teacher')} className={`px-4 py-2 rounded-xl font-bold text-sm ${roleFilter==='teacher' ? 'bg-slate-800 text-white dark:bg-brand-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 dark:bg-slate-700'}`}>Docentes</button>
                       <button onClick={()=>setRoleFilter('director')} className={`px-4 py-2 rounded-xl font-bold text-sm ${roleFilter==='director' ? 'bg-slate-800 text-white dark:bg-brand-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 dark:bg-slate-700'}`}>Directores</button>
                       <button onClick={()=>setRoleFilter('admin')} className={`px-4 py-2 rounded-xl font-bold text-sm ${roleFilter==='admin' ? 'bg-slate-800 text-white dark:bg-brand-600' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 dark:bg-slate-700'}`}>Admin</button>

                    <div className="overflow-x-auto border border-slate-200 dark:border-slate-700 rounded-2xl">

              {adminTab === 'calendario' && (

                       </div>
                       
                       <Button onClick={handleSaveSemester} className="w-full md:w-auto" icon={Save}>Guardar Configuración en DB</Button>
                    </Card>

                    <Card className="border-t-[6px] border-t-indigo-500">
                       <h3 className="font-black text-2xl mb-2 flex items-center gap-3"><Layers className="text-indigo-500"/> Núcleos Temáticos / Líneas</h3>
                       <p className="text-slate-500 mb-8 font-medium">Crea agrupaciones personalizadas para categorizar las materias en el dashboard analítico.</p>
                       
                       <div className="flex gap-4 mb-6">
                           <input type="text" placeholder="CÓDIGO (Ej: CDAT)" value={newNucleoCode} onChange={e=>setNewNucleoCode(e.target.value)} className="w-1/3 px-4 py-3 border-2 rounded-xl bg-slate-50 dark:bg-slate-700 font-bold"/>
                           <input type="text" placeholder="Nombre de la línea (Ej: Ciencia de Datos)" value={newNucleoName} onChange={e=>setNewNucleoName(e.target.value)} className="flex-1 px-4 py-3 border-2 rounded-xl bg-slate-50 dark:bg-slate-700"/>
                       </div>
                       <Button onClick={handleAddNucleo} variant="primary" className="mb-8">Añadir Núcleo</Button>

                       <ul className="divide-y divide-slate-100 dark:divide-slate-700 mt-4 border-t border-slate-100 pt-4">
                           {nucleos.length === 0 ? <p className="text-slate-400 italic text-sm">No hay núcleos creados manualmente. Se usarán los auto-generados por el Excel.</p> : null}
                           {nucleos.map(n => (
                               <li key={n.id} className="py-2 flex justify-between items-center">
                                  <div>
                                     <Badge color="indigo">{n.code}</Badge>
                                     <span className="font-bold text-slate-700 ml-3">{n.name}</span>
                                  </div>
                                  <button onClick={()=>handleDeleteNucleo(n.id)} className="text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-colors"><Trash2 size={16}/></button>
                               </li>
                           ))}
                       </ul>
                    </Card>
                 </div>
              )}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
